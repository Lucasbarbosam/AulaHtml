<!DOCTYPE html>
<html lang="pt-br">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Formulário HTML</title>
 <link rel="stylesheet" href="../styles/formulario.css">
 <!-- <style>
  h1 { 
   color: #667fee;
  }
label {
   display: block;
   }
 </style> -->
</head>
<body>
  <main>
 <h1>Cadastro</h1>
 <form>
  <div>
   <label class="block" for="nome">Nome</label>
   <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">
  </div>
  <div>
   <label class="block" for="email">Email</label>
   <input type="email" name="email" id="email" required placeholder="Digite seu email">
  </div>
  <div>
   <label class="block" for="senha">Senha</label>
   <input type="password" name="senha" id="senha" required placeholder="Digite sua senha">
  </div>
  <div>
    <label class="block" for="nasc">Data de nascimento</label>
    <input type="date" name="nasc" id="nasc">
    </div>
  <div>
    <legend>Qual o seu nível?</legend>
    <div>
      <input type="radio" name="nivel" id="jr" value="junior">
      <label for="">Júnior</label>
    </div>
    <div>
      <input type="radio" name="nivel" id="pl" value="Pleno">
      <label for="">Pleno</label>
    </div>
    <div>
      <input type="radio" name="nivel" id="sr" value="senior">
      <label for="">Sênior</label>
    </div>
    <div>
      <input type="radio" name="nivel" id="outro">
      <label for="">Outro</label>
    </div>
    <div>
      <label for="observacao">Em caso de outro, especifique:</label>
      <textarea class="block" name="observacao" id="observacao" maxlength="10"></textarea>
    </div>
    </div>
    <div>
      <legend>Quais as suas Stack?</legend>
      <div>
        <input type="checkbox" name="stcak" id="html" value="html">
        <label for="html">HTML</label>
      </div>
      <div>
        <input type="checkbox" name="stcak" id="css" value="css">
        <label for="html">CSS</label>
      </div>
      <div>
        <input type="checkbox" name="stcak" id="js" value="JavaScript">
        <label for="html">JavaScript</label>
      </div>
    </div>
  <button class="btn">Cadastrar</button>
 </form>
 </main>
</body>
</html>
